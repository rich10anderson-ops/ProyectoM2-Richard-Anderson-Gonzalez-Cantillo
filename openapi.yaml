openapi: 3.0.3
info:
  title: Blog API
  version: 1.0.0
  description: API REST para gestionar autores, posts y comentarios
servers:
  - url: http://localhost:3000
paths:
  /api/authors:
    get:
      summary: Listar autores
      responses:
        '200':
          description: Lista de autores
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Author'
    post:
      summary: Crear autor
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthorInput'
      responses:
        '201':
          description: Autor creado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Author'
        '400':
          description: Datos invalidos
        '409':
          description: Email duplicado
  /api/authors/{id}:
    get:
      summary: Obtener autor por id
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Autor encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Author'
        '404':
          description: No encontrado
    put:
      summary: Actualizar autor
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthorInput'
      responses:
        '200':
          description: Autor actualizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Author'
        '404':
          description: No encontrado
    delete:
      summary: Eliminar autor
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Eliminado
        '404':
          description: No encontrado
  /api/posts:
    get:
      summary: Listar posts
      parameters:
        - in: query
          name: published
          schema:
            type: boolean
      responses:
        '200':
          description: Lista de posts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Post'
    post:
      summary: Crear post
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PostInput'
      responses:
        '201':
          description: Post creado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Post'
        '400':
          description: Datos invalidos o author_id inexistente
  /api/posts/{id}:
    get:
      summary: Obtener post
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Post encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Post'
        '404':
          description: No encontrado
    put:
      summary: Actualizar post
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PostInput'
      responses:
        '200':
          description: Actualizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Post'
        '400':
          description: Datos invalidos
        '404':
          description: No encontrado
    delete:
      summary: Eliminar post
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Eliminado
        '404':
          description: No encontrado
  /api/posts/author/{authorId}:
    get:
      summary: Listar posts por autor
      parameters:
        - in: path
          name: authorId
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Lista de posts del autor
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Post'
  /api/comments:
    get:
      summary: Listar comentarios
      responses:
        '200':
          description: Lista de comentarios
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Comment'
    post:
      summary: Crear comentario
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CommentInput'
      responses:
        '201':
          description: Comentario creado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Comment'
        '400':
          description: post_id o author_id invalidos
  /api/comments/{id}:
    get:
      summary: Obtener comentario
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Comentario encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Comment'
        '404':
          description: No encontrado
    put:
      summary: Actualizar comentario
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CommentInput'
      responses:
        '200':
          description: Comentario actualizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Comment'
        '404':
          description: No encontrado
    delete:
      summary: Eliminar comentario
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Eliminado
        '404':
          description: No encontrado
components:
  parameters:
    IdParam:
      in: path
      name: id
      required: true
      schema:
        type: integer
  schemas:
    Author:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
          format: email
        bio:
          type: string
        created_at:
          type: string
          format: date-time
    AuthorInput:
      type: object
      required: [name, email]
      properties:
        name:
          type: string
        email:
          type: string
          format: email
        bio:
          type: string
    Post:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        content:
          type: string
        author_id:
          type: integer
        published:
          type: boolean
        created_at:
          type: string
          format: date-time
    PostInput:
      type: object
      required: [title, content, author_id]
      properties:
        title:
          type: string
        content:
          type: string
        author_id:
          type: integer
        published:
          type: boolean
    Comment:
      type: object
      properties:
        id:
          type: integer
        post_id:
          type: integer
        author_id:
          type: integer
        body:
          type: string
        created_at:
          type: string
          format: date-time
    CommentInput:
      type: object
      required: [post_id, author_id, body]
      properties:
        post_id:
          type: integer
        author_id:
          type: integer
        body:
          type: string
