<svg xmlns="http://www.w3.org/2000/svg" width="520" height="260" viewBox="0 0 520 260" font-family="Arial, sans-serif">
  <style>
    .box { fill: #f5f7fb; stroke: #4a5568; stroke-width: 1.6; }
    .title { fill: #2d3748; font-weight: 700; font-size: 14px; }
    .text { fill: #2d3748; font-size: 12px; }
    .arrow { stroke: #2b6cb0; stroke-width: 2; marker-end: url(#arrowhead); }
  </style>
  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="6" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#2b6cb0" />
    </marker>
  </defs>
  <rect x="30" y="30" width="120" height="60" rx="8" class="box" />
  <text x="90" y="58" text-anchor="middle" class="title">Client</text>
  <text x="90" y="76" text-anchor="middle" class="text">HTTP / JSON</text>

  <rect x="200" y="30" width="120" height="60" rx="8" class="box" />
  <text x="260" y="58" text-anchor="middle" class="title">Express API</text>
  <text x="260" y="76" text-anchor="middle" class="text">Routers + Middleware</text>

  <rect x="370" y="30" width="120" height="60" rx="8" class="box" />
  <text x="430" y="58" text-anchor="middle" class="title">Services</text>
  <text x="430" y="76" text-anchor="middle" class="text">Validación + Queries</text>

  <rect x="370" y="150" width="120" height="60" rx="8" class="box" />
  <text x="430" y="178" text-anchor="middle" class="title">PostgreSQL</text>
  <text x="430" y="196" text-anchor="middle" class="text">Schema + FKs</text>

  <line x1="150" y1="60" x2="200" y2="60" class="arrow" />
  <line x1="320" y1="60" x2="370" y2="60" class="arrow" />
  <line x1="430" y1="90" x2="430" y2="150" class="arrow" />

  <text x="175" y="52" text-anchor="middle" class="text">REST</text>
  <text x="345" y="52" text-anchor="middle" class="text">DTO</text>
  <text x="450" y="122" class="text">SQL parametrizado</text>

  <rect x="200" y="150" width="120" height="60" rx="8" class="box" />
  <text x="260" y="178" text-anchor="middle" class="title">Error Handler</text>
  <text x="260" y="196" text-anchor="middle" class="text">JSON 400/404/409/500</text>

  <line x1="260" y1="90" x2="260" y2="150" class="arrow" />
  <text x="270" y="122" class="text">Errores</text>
</svg>
