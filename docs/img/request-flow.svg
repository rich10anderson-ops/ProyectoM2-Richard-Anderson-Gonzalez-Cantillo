<svg xmlns="http://www.w3.org/2000/svg" width="520" height="240" viewBox="0 0 520 240" font-family="Arial, sans-serif">
  <style>
    .box { fill: #eef2ff; stroke: #4338ca; stroke-width: 1.4; }
    .title { fill: #1f2937; font-weight: 700; font-size: 13px; }
    .text { fill: #1f2937; font-size: 11px; }
    .arrow { stroke: #4338ca; stroke-width: 2; marker-end: url(#arrowhead); }
  </style>
  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="6" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#4338ca" />
    </marker>
  </defs>
  <rect x="30" y="40" width="120" height="50" rx="8" class="box" />
  <text x="90" y="68" text-anchor="middle" class="title">Request</text>
  <text x="90" y="85" text-anchor="middle" class="text">JSON body + params</text>

  <rect x="200" y="40" width="120" height="50" rx="8" class="box" />
  <text x="260" y="68" text-anchor="middle" class="title">Validaciones</text>
  <text x="260" y="85" text-anchor="middle" class="text">ids, strings, booleanos</text>

  <rect x="370" y="40" width="120" height="50" rx="8" class="box" />
  <text x="430" y="68" text-anchor="middle" class="title">Servicio</text>
  <text x="430" y="85" text-anchor="middle" class="text">query parametrizada</text>

  <rect x="370" y="140" width="120" height="50" rx="8" class="box" />
  <text x="430" y="168" text-anchor="middle" class="title">PostgreSQL</text>
  <text x="430" y="185" text-anchor="middle" class="text">FK, NOT NULL, UNIQUE</text>

  <rect x="200" y="140" width="120" height="50" rx="8" class="box" />
  <text x="260" y="168" text-anchor="middle" class="title">Error Handler</text>
  <text x="260" y="185" text-anchor="middle" class="text">map 400/404/409/500</text>

  <line x1="150" y1="65" x2="200" y2="65" class="arrow" />
  <line x1="320" y1="65" x2="370" y2="65" class="arrow" />
  <line x1="430" y1="90" x2="430" y2="140" class="arrow" />
  <line x1="370" y1="165" x2="320" y2="165" class="arrow" />
  <line x1="200" y1="165" x2="150" y2="165" class="arrow" />

  <text x="175" y="57" text-anchor="middle" class="text">Middleware</text>
  <text x="345" y="57" text-anchor="middle" class="text">DTO limpio</text>
  <text x="450" y="125" class="text">SQL</text>
  <text x="345" y="155" text-anchor="middle" class="text">Errores PG</text>
  <text x="175" y="155" text-anchor="middle" class="text">Respuesta JSON</text>
</svg>
